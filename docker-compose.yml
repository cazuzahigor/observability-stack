name: observability

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: prometheus
    restart: unless-stopped
    user: "65534:65534"  # nobody
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --storage.tsdb.retention.size=10GB
      - --web.enable-lifecycle
      - --web.listen-address=:9090
    expose:
      - "9090"
    ports:
      - "127.0.0.1:9090:9090"  # loopback only; reach via Tailscale/SSH tunnel
    networks:
      - monitoring

  node_exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node_exporter
    restart: unless-stopped
    pid: host
    network_mode: host  # required to collect real host network metrics
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro,rslave
      - /run/systemd/private:/run/systemd/private:ro
      - /var/lib/node_exporter/textfile:/var/lib/node_exporter/textfile:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|rootfs/var/lib/docker/containers|rootfs/var/lib/docker/overlay2|rootfs/run/docker/netns|rootfs/var/lib/docker/aufs)($$|/)
      - --collector.systemd
      - --collector.systemd.unit-include=^(ssh|sshd|docker|tailscaled|node_exporter|cron|systemd-journald)\.service$$
      - --collector.processes
      - --collector.textfile.directory=/var/lib/node_exporter/textfile

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: unless-stopped
    environment:
      DISCORD_WEBHOOK_STATUS: ${DISCORD_WEBHOOK_STATUS}
      DISCORD_WEBHOOK_INCIDENTS: ${DISCORD_WEBHOOK_INCIDENTS}
      NTFY_TOPIC: ${NTFY_TOPIC}
    volumes:
      - ./alertmanager/alertmanager.tmpl.yml:/etc/alertmanager/alertmanager.tmpl.yml:ro
      - ./alertmanager/entrypoint.sh:/usr/local/bin/entrypoint.sh:ro
      - alertmanager_data:/alertmanager
    entrypoint: ["/bin/sh", "/usr/local/bin/entrypoint.sh"]
    expose:
      - "9093"
    ports:
      - "127.0.0.1:9093:9093"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:11.3.0
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_ALLOW_ORG_CREATE: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"  # reach via Tailscale: http://asymptora-prod-01:3000
    networks:
      - monitoring

  ntfy:
    image: binwiederhier/ntfy:v2.11.0
    container_name: ntfy
    restart: unless-stopped
    command: serve
    volumes:
      - ./ntfy/server.yml:/etc/ntfy/server.yml:ro
      - ntfy_cache:/var/cache/ntfy
      - ntfy_data:/var/lib/ntfy
    ports:
      - "2586:2586"
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus_data:
  alertmanager_data:
  grafana_data:
  ntfy_cache:
  ntfy_data:
