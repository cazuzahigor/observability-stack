global:
  resolve_timeout: 5m

route:
  group_by: [alertname, instance]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: discord-incidents
  routes:
    # Heartbeat: goes only to #infra-status, once every 6 hours
    - matchers:
        - severity = heartbeat
      receiver: discord-status
      group_wait: 0s
      group_interval: 6h
      repeat_interval: 6h
      continue: false

    # Critical: incidents channel on Discord + urgent push via ntfy
    - matchers:
        - severity = critical
      receiver: critical-multichannel
      continue: false

    # Warning and info: incidents channel only
    - matchers:
        - severity =~ "warning|info"
      receiver: discord-incidents
      continue: false

receivers:
  - name: discord-status
    discord_configs:
      - webhook_url: "${DISCORD_WEBHOOK_STATUS}"
        send_resolved: false
        title: '💚 {{ .CommonLabels.instance }} — periodic status'
        message: |-
          **Host:** {{ .CommonLabels.instance }}
          **Timestamp:** {{ (index .Alerts 0).StartsAt.Format "2006-01-02 15:04:05 MST" }}

          Host is alive and responding. Detailed metrics on Grafana:
          http://asymptora-prod-01:3000/d/node-exporter-full

  - name: discord-incidents
    discord_configs:
      - webhook_url: "${DISCORD_WEBHOOK_INCIDENTS}"
        send_resolved: true
        title: '{{ if eq .Status "firing" }}🟡 [{{ .CommonLabels.severity | toUpper }}]{{ else }}✅ [RESOLVED]{{ end }} {{ .CommonLabels.alertname }}'
        message: |-
          **Host:** {{ .CommonLabels.instance }}
          **Category:** {{ .CommonLabels.category }}
          {{ range .Alerts }}
          {{ .Annotations.summary }}
          {{ .Annotations.description }}
          {{ end }}

  - name: critical-multichannel
    discord_configs:
      - webhook_url: "${DISCORD_WEBHOOK_INCIDENTS}"
        send_resolved: true
        title: '{{ if eq .Status "firing" }}🚨 [CRITICAL]{{ else }}✅ [RESOLVED]{{ end }} {{ .CommonLabels.alertname }}'
        message: |-
          **Host:** {{ .CommonLabels.instance }}
          {{ range .Alerts }}
          {{ .Annotations.summary }}
          {{ .Annotations.description }}
          {{ end }}
    webhook_configs:
      - url: "http://ntfy:2586/${NTFY_TOPIC}"
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: [alertname, instance]
  - source_matchers:
      - alertname = HostDown
    target_matchers:
      - severity =~ "warning|info"
    equal: [instance]
